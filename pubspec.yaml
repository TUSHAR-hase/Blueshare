name: blueshare
description: "Bluetooth-based file distribution application focused on Android."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  bt_classic:
    path: packages/bt_classic
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.3
  crypto: ^3.0.6
  cryptography: ^2.7.0
  uuid: ^4.5.1
  intl: ^0.20.2
  path: ^1.9.1
  mime: ^2.0.0
  flutter_foreground_task: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
